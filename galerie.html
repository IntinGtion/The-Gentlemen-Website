<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galerie – The Gentlemen</title>
    <meta name="description" content="Galerie mit Bildern aus Spielen, Events und Momenten von The Gentlemen." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" />

    <link rel="stylesheet" href="resources/style.css" />
    <link rel="icon" href="resources/brand/badge.png" type="image/png" />

    <meta name="theme-color" content="#0b0d12" />
    <meta name="color-scheme" content="dark" />
  </head>

  <body>
    <a class="skip-link" href="#content">Zum Inhalt springen</a>

    <div class="shell shell--gallery">
      <div class="left-pane">
        <header class="topbar">
          <a class="brand brand--centered" href="start.html" aria-label="The Gentlemen – Start">
            <div class="brand__row">
              <div class="brand__text">
                <div class="brand__title">The Gentlemen</div>
                <div class="brand__subtitle">Airsoft Team</div>
              </div>
            </div>
          </a>
        </header>

        <div class="left-scroll">
          <nav class="tabs" aria-label="Hauptnavigation">
          <a class="tab"  href="start.html"><span>Start</span></a>
          <a class="tab"  href="ueber-uns.html"><span>The Gentlemen</span></a>
          <a class="tab"  href="mitglieder.html"><span>Mitglieder</span></a>
          <a class="tab"  href="spielfelder.html"><span>Spielfelder</span></a>
          <a class="tab" aria-current="page" href="galerie.html"><span>Galerie</span></a>
          <a class="tab"  href="kontakt.html"><span>Kontakt</span></a>
        </nav>
          <main class="page" id="content">
            <section class="block">
              <p class="muted">Bilder aus Spieltagen, Events und Momenten. Wähle links ein Album aus und klick dich durch.</p>
              <div id="galleryStatus" class="status muted" aria-live="polite"></div>
            </section>
          </main>

          <footer class="legal" aria-label="Rechtliches">
            <span>© The Gentlemen</span>
            <a href="impressum.html">Impressum</a>
            <a href="datenschutz.html">Datenschutz</a>
            <a href="https://intingtion.de" target="_blank" rel="noopener noreferrer">Design: IntinGtion</a>
          </footer>
        </div>
      </div>

      <aside class="right-pane gallery-pane" aria-label="Galerie">
        <div id="galleryRoot" class="gallery-explorer" data-source="data/gallery.json">
          <div class="gallery-explorer__sidebar">
            <div class="gallery-explorer__title">Alben</div>
            <div id="galleryAlbums" class="album-tabs album-tabs--vertical" role="tablist" aria-orientation="vertical" aria-label="Alben"></div>
          </div>

          <div class="gallery-explorer__main">
            <div id="galleryGrid"></div>
          </div>
        </div>
      </aside>
    </div>

    <script src="resources/script.js" defer></script>
  </body>
</html>
